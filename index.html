<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ÆON Register | Futuristic Premium Nexus</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
            background: #03050c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.8rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated cyber grid + orbs */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(20, 120, 220, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 120, 220, 0.08) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: -50%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 20%, rgba(0, 255, 255, 0.08), rgba(10, 20, 60, 0) 70%);
            pointer-events: none;
            animation: driftGlow 18s infinite alternate;
            z-index: 0;
        }

        @keyframes driftGlow {
            0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
            100% { transform: translate(4%, 3%) scale(1.2); opacity: 0.7; }
        }

        /* main premium card — ultra glassmorph + animated border flux */
        .register-card {
            max-width: 840px;
            width: 100%;
            background: rgba(8, 18, 32, 0.6);
            backdrop-filter: blur(18px);
            border-radius: 3rem;
            box-shadow: 0 35px 55px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(70, 180, 255, 0.25) inset, 0 0 25px rgba(0, 255, 255, 0.1);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s;
            position: relative;
            z-index: 3;
            border: 1px solid rgba(80, 170, 255, 0.35);
        }

        .register-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 45px 65px -20px black, 0 0 0 1.5px rgba(100, 200, 255, 0.5) inset, 0 0 30px rgba(0, 210, 255, 0.2);
            border-color: rgba(0, 210, 255, 0.6);
        }

        /* animated border gradient glow */
        .register-card::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(125deg, #00ccff, #5f3eff, #ff3e9d, #00ccff);
            border-radius: 3rem;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
            filter: blur(18px);
        }

        .register-card:hover::before {
            opacity: 0.3;
        }

        /* header area with neon flair */
        .form-header {
            background: rgba(2, 12, 24, 0.65);
            padding: 2.2rem 2rem 1.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .form-header h1 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0E7FF, #6E9EFF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            text-transform: uppercase;
        }

        .form-header h1 i {
            background: none;
            color: #3fe0ff;
            text-shadow: 0 0 6px #0af;
            font-size: 2rem;
        }

        .badge-mandatory {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            border-radius: 60px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #7bc5ff;
            margin-top: 12px;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(0, 210, 255, 0.4);
        }

        .form-header p {
            color: #b3d6ff;
            font-weight: 500;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

            padding: 2.2rem 2rem 2rem;
        }

            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .input-row .input-group {
            flex: 1;
            margin-bottom: 0.7rem;
        }

        /* modern glowing label */
        label {

            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #c7e5ff;
            margin-bottom: 0.65rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            font-size: 0.85rem;
            color: #3ac0ff;
            filter: drop-shadow(0 0 3px #00a6ff);
            width: 20px;
        }

        .required-star {
            color: #ff5f7e;
            font-size: 0.9rem;
            margin-left: 3px;
        }

        /* premium inputs — neon glass */
        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(2, 12, 26, 0.65);
            border: 1.5px solid rgba(40, 130, 210, 0.6);
            border-radius: 1.5rem;
            color: #f0fcff;
            transition: all 0.25s ease;
            outline: none;
            font-family: 'Inter', monospace;
            backdrop-filter: blur(5px);
            letter-spacing: 0.2px;

            border-color: #40e0ff;
            background: rgba(5, 20, 40, 0.85);
            box-shadow: 0 0 0 4px rgba(64, 224, 255, 0.2), 0 6px 16px rgba(0, 0, 0, 0.2);
            transform: scale(1.01);
        }

        input::placeholder {
            color: #596f92;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 0.2px;
        }

        /* error highlight — futuristic glitch */
        input.error-highlight {
            border-color: #ff4d6d !important;
            background: rgba(255, 60, 90, 0.12) !important;
            box-shadow: 0 0 0 3px rgba(255, 70, 100, 0.4), 0 0 12px rgba(255, 0, 55, 0.2) !important;
        }

        /* cta button — advanced cyber */
        .btn-register {
            background: linear-gradient(95deg, #1a3f72, #0f2a4e);
            border: none;
            padding: 1.1rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 3rem;

            color: white;

            margin-top: 1rem;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 7px 14px -5px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(80, 180, 255, 0.25) inset;
            font-family: 'Space Grotesk', monospace;
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.25), transparent);
            transition: left 0.6s;
        }

        .btn-register:hover::before {
            left: 100%;

        .btn-register:hover {
            background: linear-gradient(95deg, #275d9e, #153e68);
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 120, 210, 0.4);

            color: #8cb0da;
            margin-top: 2rem;

            justify-content: center;

            color: #86b4e6;
            margin-top: 6px;
            margin-left: 10px;
            display: flex;
            align-items: center;

            50% { transform: translateX(7px);}
            75% { transform: translateX(-3px);}
            100% { transform: translateX(0);}
        }

        /* custom stylish spacing for reference field */
        .input-group i.fa-handshake {
            text-shadow: 0 0 3px cyan;
        }
    </style>
</head>
<body>

<div class="register-card">

<script>

        const passwordInput = document.getElementById('password');
        const referralInput = document.getElementById('referralNumber');

        // Helper: remove error highlights from all fields
        function removeAllHighlights() {
            const inputs = [firstNameInput, middleNameInput, lastNameInput, mobileInput, passwordInput, referralInput];
            inputs.forEach(inp => inp?.classList.remove('error-highlight'));
        }

        // highlight specific fields that are invalid
        function highlightFields(fieldsArray) {
            fieldsArray.forEach(field => field?.classList.add('error-highlight'));

        // shake card for premium alert effect

            const card = document.querySelector('.register-card');
            if (card) {
                card.classList.add('alert-shake');
                setTimeout(() => card.classList.remove('alert-shake'), 550);
            }
        }

        // mobile validation: digits only, length 7-15
        function isValidMobile(mobile) {
            if (!mobile) return false;
            const digitsOnly = mobile.replace(/\s/g, '');
            return /^[0-9]{7,15}$/.test(digitsOnly);
        }

        // generate strong random referral code (alphanumeric 7 chars, premium style)
        function generateRandomReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 7; i++) {
                const randIndex = Math.floor(Math.random() * chars.length);
                code += chars[randIndex];
            }
            return code;
        }

        // simple escapeHTML to avoid XSS on congratulations page
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body {
                            background: radial-gradient(circle at 30% 10%, #020617, #000000);

                            display: flex;

                            justify-content: center;
                            padding: 1.5rem;
                        }
                        .success-galaxy {
                            max-width: 600px;
                            width: 100%;
                            background: rgba(6, 18, 32, 0.85);
                            backdrop-filter: blur(20px);
                            border-radius: 2.8rem;
                            border: 1px solid rgba(0, 210, 255, 0.5);
                            box-shadow: 0 30px 50px -20px black, 0 0 0 1px rgba(100, 200, 255, 0.2) inset;

                        .prestige-header {
                            background: linear-gradient(125deg, #0a2a44, #021523);

                <body>
                    <div class="success-galaxy">
                        <div class="prestige-header">

        // main handler: validation, check all fields, mobile, password, generate referral and open success
        function handleRegistration() {
            // get trimmed values
            const firstName = firstNameInput.value.trim();
            const middleName = middleNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const mobile = mobileInput.value.trim();
            const password = passwordInput.value.trim();
            const referralNumber = referralInput.value.trim();

            // prepare all field checks
            const allFields = [
                { value: firstName, element: firstNameInput, name: 'First name' },
                { value: middleName, element: middleNameInput, name: 'Middle name' },
                { value: lastName, element: lastNameInput, name: 'Last name' },
                { value: mobile, element: mobileInput, name: 'Mobile number' },
                { value: password, element: passwordInput, name: 'Password' },
                { value: referralNumber, element: referralInput, name: 'Reffer number' }
            ];

            const emptyFields = [];
            const emptyElements = [];

            for (let field of allFields) {
                if (field.value === "") {
                    emptyFields.push(field.name);
                    emptyElements.push(field.element);
                }
            }

            removeAllHighlights();

            if (emptyFields.length > 0) {
                highlightFields(emptyElements);
                shakeCard();
                alert("❌ ACCESS DENIED • The following fields cannot be empty:\n➜ " + emptyFields.join("\n➜ "));
                return false;
            }

            // mobile validation (digits only)
            const mobileDigits = mobile.replace(/\s/g, '');
            if (!/^[0-9]{7,15}$/.test(mobileDigits)) {
                mobileInput.classList.add('error-highlight');
                shakeCard();
                alert("📱 INVALID MOBILE INPUT!\nPlease enter a valid numeric mobile number (7 to 15 digits). No letters or special characters.");
                return false;
            }

            // password length >= 4
            if (password.length < 4) {
                passwordInput.classList.add('error-highlight');
                shakeCard();
                alert("🔐 WEAK CREDENTIALS! Password must be at least 4 characters.");
                return false;
            }

            // generate fresh random referral code
            const newReferralCode = generateRandomReferralCode();

            // open new premium congrats page
            const opened = openCongratsPage(firstName, lastName, newReferralCode);
            if (!opened) {
                alert("✨ REGISTRATION SUCCESSFUL ✨\nYour unique referral code: " + newReferralCode);
            }
            return true;
        }

        // attach event
        registerButton.addEventListener('click', handleRegistration);

        // remove error highlight on typing for smoother experience
        const allInputList = [firstNameInput, middleNameInput, lastNameInput, mobileInput, passwordInput, referralInput];
        allInputList.forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    this.classList.remove('error-highlight');
                });
            }
        });
    })();
</script>
</body>
</html>
