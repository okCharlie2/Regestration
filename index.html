<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus Register | Premium Membership</title>
    <!-- Google Fonts: Plus Jakarta Sans for modern premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0b1120, #030614);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated grain & ambient light */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 50%, rgba(120, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        /* premium card container */
        .register-card {
            max-width: 800px;
            width: 100%;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08) inset, 0 0 20px rgba(0, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s;
            z-index: 2;
        }

        .register-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 45px 60px -24px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.12) inset;
        }

        /* header with premium accent */
        .form-header {
            background: rgba(8, 15, 30, 0.6);
            padding: 2rem 2rem 1.8rem;
            text-align: center;
            border-bottom: 1px solid rgba(80, 140, 210, 0.3);
            position: relative;
        }

        .form-header h1 {
            font-size: 2.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #B9E0FF, #7AA9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .form-header h1 i {
            background: none;
            background-clip: unset;
            -webkit-background-clip: unset;
            color: #7AA9FF;
            font-size: 1.9rem;
        }

        .form-header p {
            color: #9BB5D4;
            font-weight: 400;
            margin-top: 0.6rem;
            font-size: 0.9rem;
            letter-spacing: 0.2px;
        }

        /* form body premium spacing */
        .form-body {
            padding: 2.2rem 2rem 2rem 2rem;
        }

        .input-group {
            margin-bottom: 1.4rem;
            display: flex;
            flex-direction: column;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 0.4rem;
        }

        .input-row .input-group {
            flex: 1;
            margin-bottom: 0.6rem;
        }

        /* modern label design */
        label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #C7E2FF;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            font-size: 0.85rem;
            color: #5F8FDD;
            width: 18px;
        }

        .required-star {
            color: #FF7A7A;
            font-size: 0.9rem;
            margin-left: 2px;
        }

        /* premium input fields */
        input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            font-size: 0.95rem;
            font-weight: 500;
            background: rgba(12, 20, 35, 0.7);
            border: 1.5px solid rgba(70, 110, 160, 0.5);
            border-radius: 1.2rem;
            color: #F0F4FF;
            transition: all 0.25s ease;
            outline: none;
            font-family: 'Inter', monospace;
            backdrop-filter: blur(4px);
        }

        input:focus {
            border-color: #6C9EFF;
            background: rgba(20, 32, 52, 0.8);
            box-shadow: 0 0 0 4px rgba(108, 158, 255, 0.2), 0 4px 12px rgba(0,0,0,0.1);
            transform: scale(1.01);
        }

        input::placeholder {
            color: #5F7492;
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* error highlight style — premium red glow */
        input.error-highlight {
            border-color: #FF5C6E !important;
            background: rgba(255, 80, 100, 0.08) !important;
            box-shadow: 0 0 0 3px rgba(255, 70, 90, 0.25) !important;
        }

        /* button premium design */
        .btn-register {
            background: linear-gradient(105deg, #2C4B8C, #1E3A6F);
            border: none;
            padding: 1rem 1.6rem;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            border-radius: 2.8rem;
            width: 100%;
            color: white;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 18px -8px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            font-family: 'Inter', sans-serif;
        }

        .btn-register i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .btn-register:hover {
            background: linear-gradient(105deg, #3E61A5, #254878);
            transform: translateY(-2px);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-register:active {
            transform: translateY(1px);
        }

        /* footnote premium style */
        .form-footnote {
            font-size: 0.7rem;
            text-align: center;
            color: #8AA6D0;
            margin-top: 1.8rem;
            border-top: 1px solid rgba(90, 125, 170, 0.3);
            padding-top: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* responsive behaviour */
        @media (max-width: 640px) {
            .form-body {
                padding: 1.5rem;
            }
            .input-row {
                flex-direction: column;
                gap: 0.2rem;
            }
            .form-header h1 {
                font-size: 1.7rem;
            }
        }

        /* shake animation (premium) */
        .alert-shake {
            animation: shakeGlow 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeGlow {
            0% { transform: translateX(0); box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);}
            20% { transform: translateX(-6px); box-shadow: 0 20px 35px -10px rgba(255,70,70,0.2);}
            40% { transform: translateX(6px);}
            60% { transform: translateX(-3px);}
            80% { transform: translateX(2px);}
            100% { transform: translateX(0);}
        }

        /* extra ambient glow for card */
        .register-card::before {
            content: "";
            position: absolute;
            top: -30%;
            left: -20%;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at center, rgba(80, 140, 255, 0.08), transparent 70%);
            pointer-events: none;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="form-header">
        <h1>
            <i class="fas fa-gem"></i> 
            REGISTRATION
            <i class="fas fa-crown"></i>
        </h1>
        <p>Secure your premium access • Lifetime referral rewards</p>
    </div>

    <div class="form-body">
        <form id="registrationForm" action="javascript:void(0);" method="post" novalidate>
            <!-- Full name row: First, Middle, Last with modern icons inside labels -->
            <div class="input-row">
                <div class="input-group">
                    <label><i class="fas fa-user-pen"></i> First name <span class="required-star">*</span></label>
                    <input type="text" id="firstName" placeholder="e.g., Aarav" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-user-tag"></i> Middle name <span class="required-star">*</span></label>
                    <input type="text" id="middleName" placeholder="e.g., Kumar" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-signature"></i> Last name <span class="required-star">*</span></label>
                    <input type="text" id="lastName" placeholder="e.g., Sharma" autocomplete="off">
                </div>
            </div>

            <!-- Mobile number with phone icon -->
            <div class="input-group">
                <label><i class="fas fa-mobile-alt"></i> Mobile number <span class="required-star">*</span></label>
                <input type="tel" id="mobileNumber" placeholder="+91 9876543210 / 10 digits" autocomplete="off">
            </div>

            <!-- Password with lock icon -->
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password <span class="required-star">*</span></label>
                <input type="password" id="password" placeholder="•••••••• (min. 4 characters)" autocomplete="new-password">
            </div>

            <!-- Reffer number (sponsor code) -->
            <div class="input-group">
                <label><i class="fas fa-handshake"></i> Reffer number <span class="required-star">*</span></label>
                <input type="text" id="referralNumber" placeholder="Enter sponsor / referral code" autocomplete="off">
                <div style="font-size: 0.65rem; color:#8AAAD5; margin-top: 6px; margin-left: 8px;">
                    <i class="fas fa-info-circle"></i> Required field — any valid code works
                </div>
            </div>

            <!-- registration action button -->
            <button type="button" id="registerBtn" class="btn-register">
                <i class="fas fa-check-circle"></i> REGESTRATION
                <i class="fas fa-arrow-right"></i>
            </button>
            <div class="form-footnote">
                <i class="fas fa-shield-alt"></i> All fields mandatory • after success, new referral code generated
                <i class="fas fa-star-of-life"></i>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const firstNameInput = document.getElementById('firstName');
        const middleNameInput = document.getElementById('middleName');
        const lastNameInput = document.getElementById('lastName');
        const mobileInput = document.getElementById('mobileNumber');
        const passwordInput = document.getElementById('password');
        const referralInput = document.getElementById('referralNumber');
        const registerButton = document.getElementById('registerBtn');

        // Helper: remove all error highlights
        function removeAllHighlights() {
            const inputs = [firstNameInput, middleNameInput, lastNameInput, mobileInput, passwordInput, referralInput];
            inputs.forEach(inp => inp?.classList.remove('error-highlight'));
        }

        // highlight specific fields
        function highlightFields(fieldsArray) {
            fieldsArray.forEach(field => field?.classList.add('error-highlight'));
        }

        // shake card for visual alert
        function shakeCard() {
            const card = document.querySelector('.register-card');
            if (card) {
                card.classList.add('alert-shake');
                setTimeout(() => card.classList.remove('alert-shake'), 500);
            }
        }

        // validate mobile number: digits only, length between 7 and 15
        function isValidMobile(mobile) {
            if (!mobile) return false;
            const digitsOnly = mobile.replace(/\s/g, '');
            return /^[0-9]{7,15}$/.test(digitsOnly);
        }

        // generate random referral code (alphanumeric uppercase + digits) length 7, e.g., "67H5G75"
        function generateRandomReferralCode() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 7; i++) {
                const randIdx = Math.floor(Math.random() * characters.length);
                code += characters[randIdx];
            }
            return code;
        }

        // escape HTML to avoid injection on new page
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // open new premium congratulations page with random referral code
        function openCongratsPage(userFirstName, userLastName, randomCode) {
            const displayName = userFirstName ? `${userFirstName} ${userLastName || ''}`.trim() : 'Valued Member';
            const currentDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const newWindow = window.open('', '_blank', 'width=700,height=620,resizable=yes,scrollbars=yes,toolbar=no,status=no');
            if (!newWindow) {
                alert("⚠️ Pop-up blocked! Please allow pop-ups for this site.\n\n✨ Your unique referral code: " + randomCode);
                return false;
            }
            
            newWindow.document.write(`
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>✨ Welcome | Premium Registration ✨</title>
                    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        body {
                            background: radial-gradient(ellipse at 30% 40%, #0A1120, #03060F);
                            font-family: 'Inter', sans-serif;
                            min-height: 100vh;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            padding: 2rem;
                        }
                        .glow-card {
                            max-width: 560px;
                            width: 100%;
                            background: rgba(15, 25, 45, 0.85);
                            backdrop-filter: blur(12px);
                            border-radius: 2.5rem;
                            border: 1px solid rgba(110, 160, 230, 0.3);
                            box-shadow: 0 25px 40px -18px black, 0 0 0 1px rgba(255,255,255,0.05) inset;
                            overflow: hidden;
                            text-align: center;
                            animation: fadeUp 0.6s ease-out;
                        }
                        @keyframes fadeUp {
                            from { opacity: 0; transform: translateY(30px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .celeb-header {
                            background: linear-gradient(110deg, #152C4E, #0B1A32);
                            padding: 2rem 1rem 1.6rem;
                        }
                        .icon-circle {
                            background: #2F6EB3;
                            width: 80px;
                            height: 80px;
                            border-radius: 50%;
                            display: flex;
                            margin: -50px auto 10px;
                            align-items: center;
                            justify-content: center;
                            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
                            border: 2px solid rgba(255,245,200,0.6);
                        }
                        .icon-circle i {
                            font-size: 3.2rem;
                            color: #FFE8B6;
                        }
                        .celeb-header h1 {
                            font-size: 1.9rem;
                            font-weight: 800;
                            background: linear-gradient(135deg, #FFFFFF, #B9E2FF);
                            background-clip: text;
                            -webkit-background-clip: text;
                            color: transparent;
                            margin-top: 0.7rem;
                        }
                        .content-body {
                            padding: 2rem 2rem 2.2rem;
                        }
                        .greeting {
                            font-size: 1.7rem;
                            font-weight: 700;
                            color: #F2F6FF;
                            margin-bottom: 0.5rem;
                        }
                        .greeting i {
                            color: #FFC857;
                        }
                        .user-welcome {
                            font-size: 1rem;
                            color: #B8D1FC;
                            border-bottom: 1px dashed #2F5B8E;
                            display: inline-block;
                            padding-bottom: 5px;
                            margin-bottom: 1.5rem;
                        }
                        .ref-premium {
                            background: rgba(0, 20, 45, 0.7);
                            border-radius: 2rem;
                            padding: 1rem;
                            margin: 1.2rem 0;
                            border: 1px solid rgba(90, 150, 220, 0.5);
                        }
                        .ref-label {
                            font-size: 0.7rem;
                            text-transform: uppercase;
                            letter-spacing: 2px;
                            color: #96BEF0;
                        }
                        .random-code {
                            font-size: 2.4rem;
                            font-weight: 800;
                            font-family: monospace;
                            letter-spacing: 4px;
                            background: #07162B;
                            display: inline-block;
                            padding: 0.3rem 1.2rem;
                            border-radius: 2rem;
                            color: #FFE4A3;
                            border: 1px solid #567FB3;
                            margin-top: 10px;
                            word-break: break-all;
                        }
                        .tiny-note {
                            font-size: 0.7rem;
                            color: #8BA7D5;
                            margin-top: 1rem;
                        }
                        .close-button {
                            background: linear-gradient(95deg, #2B558C, #123456);
                            border: none;
                            padding: 0.7rem 2rem;
                            border-radius: 3rem;
                            color: white;
                            font-weight: bold;
                            font-size: 0.9rem;
                            margin-top: 1rem;
                            cursor: pointer;
                            transition: 0.2s;
                            display: inline-flex;
                            gap: 10px;
                            align-items: center;
                        }
                        .close-button:hover {
                            background: #3B6EAA;
                            transform: scale(0.98);
                        }
                        footer {
                            font-size: 0.65rem;
                            background: #030E1C;
                            padding: 0.8rem;
                            color: #6E8DB0;
                        }
                    </style>
                </head>
                <body>
                    <div class="glow-card">
                        <div class="celeb-header">
                            <div class="icon-circle"><i class="fas fa-trophy"></i></div>
                            <h1><i class="fas fa-check-circle"></i> REGISTRATION SUCCESS</h1>
                        </div>
                        <div class="content-body">
                            <div class="greeting"><i class="fas fa-crown"></i> CONGRATULATIONS!</div>
                            <div class="user-welcome">✨ ${escapeHTML(displayName)} ✨</div>
                            <div class="ref-premium">
                                <div class="ref-label"><i class="fas fa-gift"></i> YOUR EXCLUSIVE REFERRAL CODE</div>
                                <div class="random-code">${escapeHTML(randomCode)}</div>
                                <div class="tiny-note"><i class="fas fa-chart-line"></i> Share this code & earn premium rewards • Example: 67H5G75</div>
                            </div>
                            <button class="close-button" onclick="window.close()"><i class="fas fa-door-open"></i> Close Dashboard</button>
                        </div>
                        <footer>© Elite Access • Secure member benefits</footer>
                    </div>
                </body>
                </html>
            `);
            newWindow.document.close();
            return true;
        }

        // main registration handler
        function handleRegistration() {
            // get trimmed values
            const firstName = firstNameInput.value.trim();
            const middleName = middleNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const mobile = mobileInput.value.trim();
            const password = passwordInput.value.trim();
            const referralNumber = referralInput.value.trim();

            // fields validation aggregate
            const allFields = [
                { value: firstName, element: firstNameInput, name: 'First name' },
                { value: middleName, element: middleNameInput, name: 'Middle name' },
                { value: lastName, element: lastNameInput, name: 'Last name' },
                { value: mobile, element: mobileInput, name: 'Mobile number' },
                { value: password, element: passwordInput, name: 'Password' },
                { value: referralNumber, element: referralInput, name: 'Reffer number' }
            ];

            const emptyFields = [];
            const emptyElements = [];

            for (let field of allFields) {
                if (field.value === "") {
                    emptyFields.push(field.name);
                    emptyElements.push(field.element);
                }
            }

            removeAllHighlights();

            if (emptyFields.length > 0) {
                highlightFields(emptyElements);
                shakeCard();
                alert("⛔ RED ALERT! ⛔\nThe following fields cannot be empty:\n• " + emptyFields.join("\n• "));
                return false;
            }

            // mobile validation strict
            const mobileDigits = mobile.replace(/\s/g, '');
            if (!/^[0-9]{7,15}$/.test(mobileDigits)) {
                mobileInput.classList.add('error-highlight');
                shakeCard();
                alert("❌ Invalid Mobile Number!\nPlease enter a valid numeric mobile number (7 to 15 digits). No letters or special characters.");
                return false;
            }

            // password length at least 4 characters
            if (password.length < 4) {
                passwordInput.classList.add('error-highlight');
                shakeCard();
                alert("🔒 Password too weak! Must be at least 4 characters.");
                return false;
            }

            // generate fresh random referral code
            const newReferralCode = generateRandomReferralCode();

            // open new congratulations page
            const opened = openCongratsPage(firstName, lastName, newReferralCode);
            if (!opened) {
                // fallback alert
                alert("🎉 Registration validated!\nYour new unique referral code: " + newReferralCode);
            }
            return true;
        }

        registerButton.addEventListener('click', handleRegistration);

        // remove error highlight while typing to improve UX
        const allInputList = [firstNameInput, middleNameInput, lastNameInput, mobileInput, passwordInput, referralInput];
        allInputList.forEach(input => {
            if (input) {
                input.addEventListener('input', function() {
                    this.classList.remove('error-highlight');
                });
            }
        });
    })();
</script>
</body>
</html>
